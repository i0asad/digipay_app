server:
  port: 8080

spring:
  application:
    name: digipay
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/digipay_db}
    username: ${SPRING_DATASOURCE_USERNAME:digipay_user}
    password: ${SPRING_DATASOURCE_PASSWORD:digipay_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

logging:
  level:
    org.springframework.security: WARN
    org.springframework.web: INFO
    com.asad.digipay: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: 86400000 # 24 hours
